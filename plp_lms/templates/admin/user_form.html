{% extends "base.html" %}

{% block title %}{{ "Edit User" if edit_user else "Create User" }} - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-[#1A2B4A]">{{ "Edit User" if edit_user else "Create User" }}</h1>
        <a href="/admin/users" class="text-sm text-gray-500 hover:text-[#1A2B4A] transition-colors">
            <i class="fas fa-arrow-left mr-1"></i> Back to Users
        </a>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <form method="POST" action="{% if edit_user %}/admin/users/{{ edit_user.id }}/edit{% else %}/admin/users/create{% endif %}" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <input type="hidden" name="dummy_token" value="dummy">

            <div>
                <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="full_name" id="full_name" value="{{ edit_user.full_name if edit_user else '' }}" required aria-required="true"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors">
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="username" value="{{ edit_user.username if edit_user else '' }}" required aria-required="true"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" value="{{ edit_user.email if edit_user else '' }}" required aria-required="true"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors">
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <select name="role" id="role" required aria-required="true"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors bg-white">
                    <option value="superadmin" {{ "selected" if edit_user and edit_user.role == 'superadmin' else '' }}>Superadmin</option>
                    <option value="trainer" {{ "selected" if edit_user and edit_user.role == 'trainer' else '' }}>Trainer</option>
                    <option value="learner" {{ "selected" if edit_user and edit_user.role == 'learner' else '' }}>Learner</option>
                    <option value="observer" {{ "selected" if edit_user and edit_user.role == 'observer' else '' }}>Observer</option>
                </select>
            </div>

            {% if not edit_user %}
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" required aria-required="true"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors">
            </div>
            {% else %}
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password (leave blank to keep current)</label>
                <input type="password" name="new_password" id="new_password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#C9912B] focus:border-transparent outline-none transition-colors">
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" name="is_active" id="is_active" value="1" {{ "checked" if edit_user.is_active else '' }}
                       class="w-4 h-4 text-[#C9912B] border-gray-300 rounded focus:ring-[#C9912B]">
                <label for="is_active" class="text-sm font-medium text-gray-700">Active</label>
            </div>
            <div class="flex items-center gap-3">
                <input type="checkbox" name="force_password_change" id="force_password_change" value="1" {{ "checked" if edit_user.force_password_change else '' }}
                       class="w-4 h-4 text-[#C9912B] border-gray-300 rounded focus:ring-[#C9912B]">
                <label for="force_password_change" class="text-sm font-medium text-gray-700">Force password change on next login</label>
            </div>
            {% endif %}

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="px-6 py-2.5 bg-[#1A2B4A] text-white font-medium rounded-lg hover:bg-[#243b60] transition-colors">
                    <i class="fas fa-save mr-2"></i>{{ "Update User" if edit_user else "Create User" }}
                </button>
                <a href="/admin/users"
                   class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
