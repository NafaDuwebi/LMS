<div class="overflow-x-auto">
  {% if error %}
    <p class="text-red-500 text-center py-4">{{ error }}</p>
  {% elif data %}
    <table class="min-w-full divide-y divide-gray-200 text-sm">
      <thead class="bg-gray-50">
        <tr>
          {% for key in data[0].keys() %}
            <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ key }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {% for row in data %}
          <tr class="hover:bg-gray-50">
            {% for value in row.values() %}
              <td class="px-4 py-3 text-gray-700 whitespace-nowrap">{{ value }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <p class="text-xs text-gray-400 mt-2">{{ data|length }} row(s)</p>
  {% else %}
    <p class="text-gray-400 text-center py-4">No data available.</p>
  {% endif %}
</div>
