{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6" style="color: #1A2B4A;">Reports</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow border border-gray-200 p-5">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-users text-2xl" style="color: #C9912B;"></i>
                <h3 class="text-lg font-semibold text-gray-900">Cohort Summary</h3>
            </div>
            <form method="POST" action="{{ '/reports/cohort-summary' }}" class="space-y-3">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
                <input type="hidden" name="dummy_token" value="dummy">
                <select name="cohort_id" id="cohort_id" required aria-required="true" aria-label="Cohort" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2" style="focus:ring-color: #C9912B;">
                    <option value="">Select cohort...</option>
                    {% for cohort in cohorts %}
                    <option value="{{ cohort.id }}">{{ cohort.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="w-full px-4 py-2 rounded text-white text-sm font-medium hover:opacity-90" style="background-color: #1A2B4A;">
                    <i class="fas fa-file-alt mr-1"></i>Generate
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow border border-gray-200 p-5">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-chart-line text-2xl" style="color: #C9912B;"></i>
                <h3 class="text-lg font-semibold text-gray-900">Learner Progress</h3>
            </div>
            <form method="POST" action="{{ '/reports/learner-progress' }}" class="space-y-3">
                <input type="hidden" name="dummy_token" value="dummy">
                <select name="course_id" id="course_id" required aria-required="true" aria-label="Course" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2" style="focus:ring-color: #C9912B;">
                    <option value="">Select course...</option>
                    {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.title }}</option>
                    {% endfor %}
                </select>
                <select name="learner_id" id="learner_id" required aria-required="true" aria-label="Learner" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2" style="focus:ring-color: #C9912B;">
                    <option value="">Select learner...</option>
                </select>
                <button type="submit" class="w-full px-4 py-2 rounded text-white text-sm font-medium hover:opacity-90" style="background-color: #1A2B4A;">
                    <i class="fas fa-file-alt mr-1"></i>Generate
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow border border-gray-200 p-5">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-certificate text-2xl" style="color: #C9912B;"></i>
                <h3 class="text-lg font-semibold text-gray-900">Certificate Register</h3>
            </div>
            <form method="POST" action="{{ '/reports/certificate-register' }}" class="space-y-3">
                <input type="hidden" name="dummy_token" value="dummy">
                <select name="course_id" id="cert_course_id" aria-label="Course" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2" style="focus:ring-color: #C9912B;">
                    <option value="">All courses</option>
                    {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.title }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="w-full px-4 py-2 rounded text-white text-sm font-medium hover:opacity-90" style="background-color: #1A2B4A;">
                    <i class="fas fa-file-alt mr-1"></i>Generate
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow border border-gray-200 p-5">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-clipboard-check text-2xl" style="color: #C9912B;"></i>
                <h3 class="text-lg font-semibold text-gray-900">Compliance Report</h3>
            </div>
            <form method="POST" action="{{ '/reports/compliance' }}" class="space-y-3">
                <input type="hidden" name="dummy_token" value="dummy">
                <select name="cohort_id" id="compliance_cohort_id" required aria-required="true" aria-label="Cohort" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2" style="focus:ring-color: #C9912B;">
                    <option value="">Select cohort...</option>
                    {% for cohort in cohorts %}
                    <option value="{{ cohort.id }}">{{ cohort.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="w-full px-4 py-2 rounded text-white text-sm font-medium hover:opacity-90" style="background-color: #1A2B4A;">
                    <i class="fas fa-file-alt mr-1"></i>Generate
                </button>
            </form>
        </div>
    </div>

    <div id="reportResults" class="bg-white rounded-lg shadow border border-gray-200 p-6">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Results</h3>
        <div id="reportContent" class="overflow-x-auto">
            <p class="text-gray-400 text-center py-8">Select a report type and click Generate to view results.</p>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('form').forEach(function(form) {
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var formData = new FormData(this);
        var params = new URLSearchParams(formData);
        var url = this.action + (params.toString() ? '?' + params.toString() : '');
        fetch(url, { method: 'GET' })
            .then(function(r) { return r.text(); })
            .then(function(html) {
                document.getElementById('reportContent').innerHTML = html;
            })
            .catch(function() {
                document.getElementById('reportContent').innerHTML = '<p class="text-red-500 text-center py-4">Error loading report.</p>';
            });
    });
});
</script>
{% endblock %}
