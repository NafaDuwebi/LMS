{% extends "base.html" %}
{% block title %}{{ "Edit" if cohort else "Create" }} Cohort{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold mb-6" style="color: #1A2B4A;">
    {{ "Edit" if cohort else "Create" }} Cohort
  </h1>

  <form method="POST" class="bg-white shadow rounded-lg p-6 space-y-5">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
    {{ form.hidden_tag() if form is defined }}
    <input type="hidden" name="dummy_token" value="dummy">

    <div>
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" id="name" required aria-required="true" maxlength="200"
             value="{{ cohort.name if cohort else '' }}"
             class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
    </div>

    <div>
      <label for="course_id" class="block text-sm font-medium text-gray-700 mb-1">Course</label>
      <select name="course_id" id="course_id" required aria-required="true"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
        <option value="">— Select course —</option>
        {% for course in courses %}
        <option value="{{ course.id }}" {{ 'selected' if cohort and cohort.course_id == course.id else '' }}>
          {{ course.title }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="trainer_id" class="block text-sm font-medium text-gray-700 mb-1">Trainer</label>
      <select name="trainer_id" id="trainer_id"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
        <option value="">— Select trainer —</option>
        {% for trainer in trainers %}
        <option value="{{ trainer.id }}" {{ 'selected' if cohort and cohort.trainer_id == trainer.id else '' }}>
          {{ trainer.full_name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="start_date" class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
        <input type="date" name="start_date" id="start_date" required aria-required="true"
               value="{{ cohort.start_date.strftime('%Y-%m-%d') if cohort and cohort.start_date else '' }}"
               class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
      </div>
      <div>
        <label for="end_date" class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
        <input type="date" name="end_date" id="end_date" required aria-required="true"
               value="{{ cohort.end_date.strftime('%Y-%m-%d') if cohort and cohort.end_date else '' }}"
               class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
      </div>
    </div>

    <div>
      <label for="max_learners" class="block text-sm font-medium text-gray-700 mb-1">Max Learners</label>
      <input type="number" name="max_learners" id="max_learners" min="1"
             value="{{ cohort.max_learners if cohort else '' }}"
             class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
    </div>

    <div>
      <label for="delivery_mode" class="block text-sm font-medium text-gray-700 mb-1">Delivery Mode</label>
      <select name="delivery_mode" id="delivery_mode" required aria-required="true"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
        <option value="online" {{ 'selected' if cohort and cohort.delivery_mode == 'online' else '' }}>Online</option>
        <option value="classroom" {{ 'selected' if cohort and cohort.delivery_mode == 'classroom' else '' }}>Classroom</option>
        <option value="blended" {{ 'selected' if cohort and cohort.delivery_mode == 'blended' else '' }}>Blended</option>
      </select>
    </div>

    <div>
      <label for="venue" class="block text-sm font-medium text-gray-700 mb-1">Venue</label>
      <input type="text" name="venue" id="venue" maxlength="300"
             value="{{ cohort.venue if cohort else '' }}"
             class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#C9912B] focus:border-transparent">
    </div>

    {% if cohort %}
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" id="is_active" value="1"
             {{ 'checked' if cohort.is_active else '' }}
             class="h-4 w-4 rounded border-gray-300 text-[#C9912B] focus:ring-[#C9912B]">
      <label for="is_active" class="text-sm font-medium text-gray-700">Active</label>
    </div>
    {% endif %}

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="px-6 py-2 rounded-md text-white font-medium transition-colors"
              style="background-color: #C9912B;"
              onmouseover="this.style.backgroundColor='#b47d24'"
              onmouseout="this.style.backgroundColor='#C9912B'">
        {{ "Update" if cohort else "Create" }} Cohort
      </button>
      <a href="{{ '/cohorts' }}"
         class="px-6 py-2 rounded-md border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
