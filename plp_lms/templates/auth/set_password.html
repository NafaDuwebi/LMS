{% extends "base.html" %}
{% block title %}Set Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-primary mb-6"><i class="fas fa-key mr-2 text-accent"></i>Set Your Password</h1>
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
        {% endif %}
        {% if token %}
        <form method="POST" action="/auth/set-password" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" name="new_password" id="new_password" required aria-required="true" minlength="8" class="mt-1 block w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required aria-required="true" minlength="8" class="mt-1 block w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-primary">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-md hover:bg-primary-light transition">Set Password</button>
        </form>
        {% else %}
        <p class="text-gray-600">No setup token provided. Use the link from your welcome email.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
