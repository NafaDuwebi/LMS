{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-lock text-5xl text-primary"></i>
            <h1 class="text-2xl font-bold text-primary mt-4">Forgot Password</h1>
        </div>
        {% if error %}
        <div class="mb-4 px-4 py-3 rounded text-sm font-medium bg-red-100 text-red-700 border border-red-200">{{ error }}</div>
        {% endif %}
        {% if sent %}
        <div class="mb-4 px-4 py-3 rounded text-sm font-medium bg-green-100 text-green-700 border border-green-200">
            <i class="fas fa-check-circle mr-2"></i>If an account exists with that email, a reset link has been sent.
        </div>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="/auth/login" class="text-accent hover:underline">Back to login</a>
        </p>
        {% else %}
        <form method="POST" action="/auth/forgot-password" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" name="email" id="email" required aria-required="true" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-md hover:bg-primary-light transition font-medium">Send Reset Link</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="/auth/login" class="text-accent hover:underline">Back to login</a>
        </p>
        {% endif %}
    </div>
</div>
{% endblock %}
