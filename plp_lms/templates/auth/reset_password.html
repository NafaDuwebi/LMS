{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-key text-5xl text-primary"></i>
            <h1 class="text-2xl font-bold text-primary mt-4">Reset Password</h1>
        </div>
        {% if error %}
        <div class="mb-4 px-4 py-3 rounded text-sm font-medium bg-red-100 text-red-700 border border-red-200">{{ error }}</div>
        {% endif %}
        {% if token %}
        <form method="POST" action="/auth/reset-password" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" name="new_password" id="new_password" required aria-required="true" minlength="10" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required aria-required="true" minlength="10" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-md hover:bg-primary-light transition font-medium">Reset Password</button>
        </form>
        {% else %}
        <p class="text-gray-600 text-center">Invalid or expired reset link.</p>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="/auth/forgot-password" class="text-accent hover:underline">Request a new link</a>
        </p>
        {% endif %}
    </div>
</div>
{% endblock %}
