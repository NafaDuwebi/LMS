{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-primary mb-6"><i class="fas fa-key mr-2 text-accent"></i>Change Password</h1>
        <p class="text-gray-600 mb-4 text-sm">You are required to change your password before continuing.</p>
        <form method="POST" action="/auth/change-password" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <div>
                <label for="current_password" class="block text-sm font-medium text-gray-700">Current Password</label>
                <input type="password" name="current_password" id="current_password" required aria-required="true" class="mt-1 block w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" name="new_password" id="new_password" required aria-required="true" minlength="8" class="mt-1 block w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-primary">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-md hover:bg-primary-light transition">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
