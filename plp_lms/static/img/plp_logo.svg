<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44" role="img" aria-label="PL Projects">
  <title>PL Projects</title>

  <!-- Three gold chevrons matching plprojects.co.uk logo -->
  <!-- Chevron 1 (leftmost) -->
  <polygon points="4,8 16,22 4,36 10,36 22,22 10,8" fill="#FFC000"/>
  <!-- Chevron 2 (middle) -->
  <polygon points="14,8 26,22 14,36 20,36 32,22 20,8" fill="#FFC000"/>
  <!-- Chevron 3 (rightmost) -->
